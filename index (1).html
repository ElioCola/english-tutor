<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor · Elio</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#F7F5F0;--surface:#FFFFFF;--surface2:#F0EDE8;--border:#E2DDD6;--text:#1A1714;--muted:#7A7570;--accent:#2C5F4A;--accent-light:#E8F2EE;--warn:#C0392B;--warn-light:#FCECEA;--ok:#2C5F4A;--ok-light:#E8F2EE;--gold:#B8860B;--gold-light:#FFF8E6;--radius:12px;--radius-sm:8px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.shell{display:flex;min-height:100vh}
.sidebar{width:230px;background:var(--surface);border-right:1px solid var(--border);padding:1.25rem 1rem;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;overflow-y:auto}
.main{margin-left:230px;flex:1;padding:2rem;max-width:800px}
.logo{font-family:'Lora',serif;font-size:17px;font-weight:500;color:var(--accent);margin-bottom:2px}
.logo-sub{font-size:11px;color:var(--muted);margin-bottom:1.25rem}
.level-badge{background:var(--accent-light);color:var(--accent);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;text-align:center;margin-bottom:1rem}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:1.25rem}
.stat-box{background:var(--surface2);border-radius:var(--radius-sm);padding:8px;text-align:center}
.stat-num{font-size:18px;font-weight:500;color:var(--text)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.nav-section{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin:1rem 0 .4rem}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--muted);transition:all .15s;margin-bottom:2px;border:none;background:none;width:100%;text-align:left}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--accent-light);color:var(--accent);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;background:currentColor;opacity:.5;flex-shrink:0}
.nav-item.active .nav-dot{opacity:1}
.xp-bar-wrap{margin-top:auto;padding-top:1rem;border-top:1px solid var(--border)}
.xp-label{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px}
.xp-bar{height:5px;background:var(--border);border-radius:3px}
.xp-fill{height:5px;background:var(--accent);border-radius:3px;transition:width .5s ease}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem}
.page-header{margin-bottom:1.5rem}
.page-title{font-family:'Lora',serif;font-size:24px;color:var(--text);margin-bottom:3px}
.page-sub{font-size:13px;color:var(--muted)}
.reading-box{background:var(--gold-light);border:1px solid #E8D8A0;border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.reading-label{font-size:10px;font-weight:500;color:var(--gold);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.reading-text{font-family:'Lora',serif;font-size:14px;line-height:1.9;color:var(--text)}
.reading-text em{background:#FFE88A;border-radius:3px;padding:0 3px;font-style:normal;font-weight:500}
.vocab-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:7px;margin-top:.75rem}
.vocab-chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:7px 11px}
.vocab-en{font-size:13px;font-weight:500;color:var(--text)}
.vocab-it{font-size:11px;color:var(--muted);margin-top:2px}
.grammar-box{background:var(--accent-light);border:1px solid #B8D4C8;border-radius:var(--radius);padding:1.25rem;margin-bottom:1rem}
.grammar-label{font-size:10px;font-weight:500;color:var(--accent);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.6rem}
.grammar-rule{font-size:14px;line-height:1.8;color:var(--text);margin-bottom:.6rem}
.grammar-ex{background:var(--surface);border-left:3px solid var(--accent);padding:8px 12px;border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin:6px 0;font-size:13px}
.grammar-ex .en{font-style:italic;color:var(--text)}
.grammar-ex .it{font-size:11px;color:var(--muted);margin-top:2px}
.error-note{margin-top:.6rem;font-size:12px;color:var(--warn);background:var(--warn-light);padding:8px 12px;border-radius:var(--radius-sm)}
.quiz-progress{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;font-size:12px;color:var(--muted)}
.progress-dots{display:flex;gap:3px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.dot.done{background:var(--accent)}
.dot.wrong-dot{background:var(--warn)}
.dot.current{background:var(--accent);opacity:.4}
.qtag{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:.4rem}
.qtext{font-family:'Lora',serif;font-size:16px;line-height:1.7;color:var(--text);margin-bottom:1rem}
.options{display:flex;flex-direction:column;gap:7px}
.opt{padding:11px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:13px;color:var(--text);background:var(--surface);text-align:left;transition:all .15s;font-family:'DM Sans',sans-serif}
.opt:hover:not(:disabled){border-color:var(--accent);background:var(--accent-light)}
.opt.correct{background:var(--ok-light);border-color:var(--ok);color:var(--ok)}
.opt.wrong{background:var(--warn-light);border-color:var(--warn);color:var(--warn)}
.opt.reveal{background:var(--ok-light);border-color:var(--ok);color:var(--ok)}
.fill-row{display:flex;gap:8px}
.fill-input{flex:1;padding:10px 13px;border:1px solid var(--border);border-radius:var(--radius-sm);font-size:14px;font-family:'Lora',serif;color:var(--text);background:var(--surface)}
.fill-input:focus{outline:none;border-color:var(--accent)}
.fill-input.correct{border-color:var(--ok);background:var(--ok-light)}
.fill-input.wrong{border-color:var(--warn);background:var(--warn-light)}
.btn-check{padding:10px 18px;border:1px solid var(--accent);border-radius:var(--radius-sm);background:var(--accent);color:#fff;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-check:hover{background:#1e4a37}
.feedback-box{margin-top:.75rem;padding:10px 14px;border-radius:var(--radius-sm);font-size:13px;line-height:1.6;display:none}
.feedback-box.show{display:block}
.feedback-box.ok{background:var(--ok-light);border:1px solid #B8D4C8;color:var(--ok)}
.feedback-box.bad{background:var(--warn-light);border:1px solid #F0B8B4;color:var(--warn)}
.next-btn{margin-top:.75rem;padding:9px 22px;border-radius:20px;border:1px solid var(--accent);color:var(--accent);background:transparent;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;display:none}
.next-btn.show{display:inline-block}
.next-btn:hover{background:var(--accent-light)}
.levelup-banner{background:var(--gold-light);border:1px solid #E8D8A0;border-radius:var(--radius);padding:1rem;margin-bottom:1rem;text-align:center;display:none}
.levelup-banner.show{display:block}
.section-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:1.25rem}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:1.1rem}
.metric-num{font-size:28px;font-weight:300;color:var(--accent)}
.metric-lbl{font-size:12px;color:var(--muted);margin-top:3px}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);font-size:13px}
.history-row:last-child{border-bottom:none}
.badge{display:inline-block;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-ok{background:var(--ok-light);color:var(--ok)}
.badge-warn{background:var(--warn-light);color:var(--warn)}
.badge-gold{background:var(--gold-light);color:var(--gold)}
.review-banner{background:#FFF3E0;border:1px solid #FFB74D;border-radius:var(--radius-sm);padding:9px 13px;font-size:12px;color:#7B4A00;margin-bottom:.75rem}
.topic-btn{padding:8px 14px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--surface2);cursor:pointer;font-size:13px;color:var(--text);transition:all .15s;font-family:'DM Sans',sans-serif}
.topic-btn:hover{border-color:var(--accent);color:var(--accent)}
.topic-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:500}
@media(max-width:600px){.sidebar{display:none}.main{margin-left:0}}
</style>
</head>
<body>
<div class="shell">
<aside class="sidebar">
  <div class="logo">English Tutor</div>
  <div class="logo-sub">Elio's adaptive app</div>
  <div class="level-badge" id="level-badge">Level B1</div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-num" id="s-streak">0</div><div class="stat-lbl">streak</div></div>
    <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">answered</div></div>
    <div class="stat-box"><div class="stat-num" id="s-acc">—</div><div class="stat-lbl">accuracy</div></div>
    <div class="stat-box"><div class="stat-num" id="s-xp">0</div><div class="stat-lbl">XP</div></div>
  </div>
  <div class="nav-section">Study</div>
  <button class="nav-item active" onclick="showPage('home')" id="nav-home"><span class="nav-dot"></span>Dashboard</button>
  <button class="nav-item" onclick="showPage('grammar')" id="nav-grammar"><span class="nav-dot"></span>Grammar</button>
  <button class="nav-item" onclick="showPage('vocab')" id="nav-vocab"><span class="nav-dot"></span>Vocabulary</button>
  <button class="nav-item" onclick="showPage('business')" id="nav-business"><span class="nav-dot"></span>Business English</button>
  <button class="nav-item" onclick="showPage('listening')" id="nav-listening"><span class="nav-dot"></span>Listening</button>
  <button class="nav-item" onclick="showPage('reading')" id="nav-reading"><span class="nav-dot"></span>Reading</button>
  <div class="nav-section">Progress</div>
  <button class="nav-item" onclick="showPage('report')" id="nav-report"><span class="nav-dot"></span>My report</button>
  <div class="xp-bar-wrap">
    <div class="xp-label"><span>Next level</span><span id="xp-text">0/100</span></div>
    <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
  </div>
</aside>
<main class="main" id="main-content"></main>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────
const SK='elio_tutor_v3';
function defState(){return{level:2,xp:0,xpTotal:0,streak:0,lastDate:'',totalAnswered:0,totalCorrect:0,history:[],weakTopics:{},strongTopics:{},consCorrect:0,consWrong:0}}
let S=loadS();
function loadS(){try{return JSON.parse(localStorage.getItem(SK))||defState()}catch{return defState()}}
function saveS(){localStorage.setItem(SK,JSON.stringify(S))}
const LN=['','A2','B1','B1+','B2','B2+','C1'];
const XPL=[0,0,80,150,250,400,600];
function lvlName(){return LN[S.level]||'B1'}

function addXP(n){
  S.xp+=n;S.xpTotal+=n;
  const need=XPL[S.level+1]||999;
  if(S.xp>=need&&S.level<6){S.level++;S.xp=0;pendingLevelUp=true}
  updateSidebar();saveS()
}
let pendingLevelUp=false;

function updateSidebar(){
  document.getElementById('level-badge').textContent='Level '+lvlName();
  document.getElementById('s-streak').textContent=S.streak;
  document.getElementById('s-total').textContent=S.totalAnswered;
  document.getElementById('s-acc').textContent=S.totalAnswered?Math.round(S.totalCorrect/S.totalAnswered*100)+'%':'—';
  document.getElementById('s-xp').textContent=S.xpTotal;
  const need=XPL[S.level+1]||100;
  document.getElementById('xp-fill').style.width=Math.min(100,Math.round(S.xp/need*100))+'%';
  document.getElementById('xp-text').textContent=S.xp+'/'+need;
}

function recordAnswer(correct,topic){
  S.totalAnswered++;
  if(correct){S.totalCorrect++;S.consCorrect++;S.consWrong=0;S.strongTopics[topic]=(S.strongTopics[topic]||0)+1;if(S.weakTopics[topic]){S.weakTopics[topic]--;if(S.weakTopics[topic]<=0)delete S.weakTopics[topic]}addXP(10)}
  else{S.consWrong++;S.consCorrect=0;S.weakTopics[topic]=(S.weakTopics[topic]||0)+1;addXP(2)}
  if(S.consCorrect>=10&&S.level<6){S.level++;S.consCorrect=0;pendingLevelUp=true}
  else if(S.consWrong>=6&&S.level>1){S.level--;S.consWrong=0}
  updateSidebar();saveS()
}

// ── CONTENT DATABASE ───────────────────────────────────────────
const DB = {

// ════════════════════════════════════════════════════════
// GRAMMAR
// ════════════════════════════════════════════════════════
grammar: [
  {
    id:'pp_intro', level:1, topic:'Present Perfect',
    lesson:{
      title:'Present Perfect — Introduction',
      rule:'Use <strong>have/has + past participle</strong> for actions that happened in the past but are connected to the present, or for experiences without a specific time.',
      rule_it:'In italiano usi spesso il passato prossimo anche con un tempo specifico ("ieri ho mangiato"). In inglese NON si fa così — con tempi specifici si usa il Past Simple.',
      examples:[
        {en:'I have never shared my bedroom.',it:'Non ho mai condiviso la mia camera.'},
        {en:"She hasn't finished the report yet.",it:'Non ha ancora finito il rapporto.'},
        {en:'Have you ever worked abroad?',it:'Hai mai lavorato all\'estero?'},
        {en:'I have just sent the email.',it:'Ho appena mandato l\'email.'},
      ],
      error:"❌ 'I didn't finish yet' → ✅ 'I haven't finished yet'"
    },
    questions:[
      {type:'mc',q:'Which sentence is correct?',opts:["I didn't never do that.","I have never done that.","I never did never that.","I haven't never done that."],ans:1,exp:"'Never' + Present Perfect: 'I have never done that.' Double negatives are wrong in English."},
      {type:'mc',q:'Choose the correct form: "She ___ already sent the email."',opts:['did','has','was','have'],ans:1,exp:"Subject 'she' → 'has' in Present Perfect."},
      {type:'fill',q:'Complete: "I ___ (not/read) a book for a long time."',ans:["haven't read","have not read"],exp:"Present Perfect negative: 'I haven't read a book for a long time.'"},
      {type:'mc',q:'"Have you ever ___ to Dublin?"',opts:['go','went','gone','goes'],ans:2,exp:"Present Perfect uses past participle: 'Have you ever GONE to Dublin?'"},
      {type:'mc',q:'Which time expression goes with Present Perfect?',opts:['yesterday','last week','in 2020','already'],ans:3,exp:"'Already','yet','ever','never','just','for','since' → Present Perfect. Specific past time → Past Simple."},
      {type:'fill',q:'Make it Present Perfect: "He reads the report every day." → Today: "He ___ the report."',ans:["has read","has already read"],exp:"'He has read the report.' Past participle of 'read' is 'read' (pronounced /rɛd/)."},
      {type:'mc',q:'"I ___ just ___ a great idea!"',opts:['did/have','have/had','had/have','has/had'],ans:1,exp:"'I have just had a great idea!' — 'just' goes between have and past participle."},
      {type:'mc',q:'"The client ___ not replied yet." Choose the correct form.',opts:['did','has','is','was'],ans:1,exp:"'The client has not replied yet.' 'Yet' signals Present Perfect."},
    ]
  },
  {
    id:'past_simple', level:1, topic:'Past Simple',
    lesson:{
      title:'Past Simple — Regular & Irregular Verbs',
      rule:'Past Simple describes <strong>completed actions at a specific time in the past</strong>. Regular verbs add -ed. Many common verbs are irregular.',
      rule_it:'Usa il Past Simple quando c\'è un tempo specifico: yesterday, last week, in 2020, this morning (se è già passata), ecc.',
      examples:[
        {en:'They did not make it on time.',it:'Non ce la fecero in tempo.'},
        {en:'He forgot his shoe because he was late.',it:'Dimenticò la scarpa perché era in ritardo.'},
        {en:'Did they make it on time? No, they didn\'t.',it:'Arrivarono in tempo? No.'},
        {en:'I worked at ShopFully for three years.',it:'Ho lavorato a ShopFully per tre anni. (periodo concluso)'},
      ],
      error:"❌ 'He didn't forgot' → ✅ 'He didn't forget' (base verb after did/didn't)"
    },
    questions:[
      {type:'mc',q:'"Did they make it on time?" — correct short answer:',opts:["Yes, they made.","No, they didn't.","No, they didn't made.","No, they not did."],ans:1,exp:"Short answer: 'No, they didn't.' Never repeat the main verb."},
      {type:'fill',q:'Complete: "He ___ (not/forget) his keys — he forgot his shoes."',ans:["didn't forget","did not forget"],exp:"Negative Past Simple: didn't + BASE verb. Not 'didn't forgot'."},
      {type:'mc',q:'What is the Past Simple of "oversleep"?',opts:['oversleeped','overslept','did oversleep','was overslept'],ans:1,exp:"Irregular: oversleep → overslept (like sleep → slept)."},
      {type:'mc',q:'Choose the correct question form:',opts:['Where did he went?','Where he went?','Where did he go?','Where has he went?'],ans:2,exp:"did + subject + BASE verb: 'Where did he go?'"},
      {type:'mc',q:'"Last year I ___ at a conference in London."',opts:['have spoken','spoke','speak','had spoke'],ans:1,exp:"'Last year' = specific past time → Past Simple: 'I spoke at a conference.'"},
      {type:'fill',q:'Complete: "She ___ (earn) €50,000 last year."',ans:["earned"],exp:"Regular verb + -ed: 'She earned €50,000 last year.'"},
      {type:'mc',q:'"Why ___ he looking for a job?"',opts:['was','did','has','were'],ans:0,exp:"'Why was he looking for a job?' — Past Continuous for ongoing past action."},
      {type:'mc',q:'Choose the irregular past: "I ___ the fault immediately."',opts:['recognized','recognizes','have recognized','recognizing'],ans:0,exp:"Regular verb: recognize → recognized."},
    ]
  },
  {
    id:'prepositions_time', level:1, topic:'Prepositions: for / since / from',
    lesson:{
      title:'Prepositions of Time: for, since, from',
      rule:'<strong>For</strong> = duration ("for 3 years"). <strong>Since</strong> = starting point ("since 2020"). <strong>From</strong> is NOT used for duration in English — common Italian mistake!',
      rule_it:'In italiano dici "lavoro qui da 3 anni" → in inglese: "I have worked here FOR 3 years." NON si dice "from 3 years".',
      examples:[
        {en:'I have studied English for three years.',it:'Studio inglese da tre anni.'},
        {en:'I have lived in Milan since 2018.',it:'Vivo a Milano dal 2018.'},
        {en:"I haven't read a book for a long time.",it:'Non leggo un libro da molto tempo.'},
        {en:'She has worked at ShopFully since December 2024.',it:'Lavora a ShopFully da dicembre 2024.'},
      ],
      error:"❌ 'I don't read from many time' → ✅ 'I haven't read for a long time'"
    },
    questions:[
      {type:'mc',q:'"I have studied English ___ 2022."',opts:['for','from','since','during'],ans:2,exp:"'Since' + point in time: 'since 2022.'"},
      {type:'mc',q:'"I have studied English ___ three years."',opts:['since','from','during','for'],ans:3,exp:"'For' + duration: 'for three years.'"},
      {type:'fill',q:'Correct: "I don\'t read from many time." → "I ___ for a long time."',ans:["haven't read","haven't read a book"],exp:"Two corrections: Present Perfect + 'for' not 'from'."},
      {type:'mc',q:'Which is correct?',opts:["She works here from 10 years.","She has worked here for 10 years.","She works here since 10 years.","She worked here from 10 years."],ans:1,exp:"Ongoing: Present Perfect + 'for' + duration."},
      {type:'mc',q:'"He has been a manager ___ he got promoted."',opts:['for','from','since','during'],ans:2,exp:"'Since' + event/point in time."},
      {type:'fill',q:'Complete: "I have managed campaigns ___ over 8 years."',ans:["for"],exp:"'For' + duration period."},
      {type:'mc',q:'"___ how long have you worked in AdTech?"',opts:['Since','From','For','During'],ans:2,exp:"Question with duration: 'For how long...' or 'How long have you...'"},
    ]
  },
  {
    id:'negation', level:1, topic:'No double negatives',
    lesson:{
      title:'No Double Negatives in English',
      rule:'In English you can NEVER use two negatives in the same clause. Choose ONE: "I have never done it" OR "I haven\'t done it." Never both together.',
      rule_it:'In italiano: "non ho mai fatto niente" (tre negative!). In inglese: "I have never done anything" oppure "I haven\'t done anything" — non entrambe.',
      examples:[
        {en:"I have never shared my room.",it:"Non ho mai condiviso la mia stanza."},
        {en:"He doesn't have any money.",it:"Non ha soldi."},
        {en:"I don't know anything.",it:"Non so niente."},
        {en:"There is nothing I can do.",it:"Non c'è niente che io possa fare."},
      ],
      error:"❌ 'I don't have no money' → ✅ 'I don't have any money' or 'I have no money'"
    },
    questions:[
      {type:'mc',q:'Choose the correct sentence:',opts:["I don't have no time.","I have no time.","I haven't no time.","I don't have none time."],ans:1,exp:"'I have no time' ✓ or 'I don't have any time' ✓ — never combine 'don't' + 'no'."},
      {type:'mc',q:'"She ___ anything about the project."',opts:["doesn't know nothing","don't know nothing","doesn't know anything","isn't knowing nothing"],ans:2,exp:"'She doesn't know anything.' — negative verb + 'any-' words."},
      {type:'fill',q:'Correct: "He doesn\'t have no experience." → "He doesn\'t have ___ experience."',ans:["any"],exp:"'He doesn't have any experience.'"},
      {type:'mc',q:'"I ___ ___ about it." (no information)',opts:["don't know nothing","know nothing","don't know anything","both B and C"],ans:3,exp:"Both 'I know nothing' and 'I don't know anything' are correct. Never combine them."},
      {type:'mc',q:'Which is wrong?',opts:["Nobody called.","I didn't call anyone.","I didn't call nobody.","No one answered."],ans:2,exp:"'I didn't call nobody' has a double negative → wrong. Use 'I didn't call anyone' or 'I called nobody'."},
    ]
  },
  {
    id:'pp_vs_ps', level:2, topic:'Present Perfect vs Past Simple',
    lesson:{
      title:'Present Perfect vs Past Simple — The Key Difference',
      rule:'<strong>Past Simple</strong> = specific time in the past (finished). <strong>Present Perfect</strong> = no specific time, or connection to the present, or with ever/never/already/yet/just/for/since.',
      rule_it:'Attenzione: "Have you ever been to London?" (PP, esperienza senza tempo specifico) vs "Did you go to London last year?" (PS, tempo specifico).',
      examples:[
        {en:'I visited Dublin in 2022.',it:'Ho visitato Dublino nel 2022. (specifico → PS)'},

    questions:[

      {type:'fill',q:'"I ___ (just/finish) the presentation."',ans:["have just finished","'ve just finished"],exp:"'I have just finished the presentation.'"},
      {type:'mc',q:'Best for a job interview: "I ___ in AdTech for 8 years and I still work there."',opts:["worked","have worked","was working","work"],ans:1,exp:"Ongoing from past to present: 'I have worked in AdTech for 8 years.' Key for interviews!"},

      {type:'mc',q:'"I ___ to three interviews last month."',opts:['have gone','went','have went','go'],ans:1,exp:"'Last month' = specific past time → Past Simple: 'I went to three interviews last month.'"},

  {

      {type:'fill',q:'Complete: "___ you help me prepare?" (polite request)',ans:["could","can"],exp:"'Could you help me...' is more polite than 'Can you help me...'"},
      {type:'mc',q:'Which is grammatically correct?',opts:["She can speaks fluently.","She can speak fluently.","She cans speak fluently.","She can to speak fluently."],ans:1,exp:"Modal + base verb: 'She can speak.' No -s, no 'to', no -ing."},
      {type:'mc',q:'"You ___ not share confidential data with competitors."',opts:['should','must','might','can'],ans:1,exp:"'Must not' (mustn't) = prohibition/strong obligation not to do something."},

      {type:'fill',q:'"We ___ (consider) all options before deciding." (obligation, formal)',ans:["must consider","should consider","ought to consider"],exp:"'We must consider all options.' — strong obligation."},
      {type:'mc',q:'"___ I help you with the presentation?"',opts:['Must','Should','Could','Might'],ans:2,exp:"'Could I help you?' — polite offer."},

      title:'Articles: a / an / the',

      rule_it:'L\'italiano non usa spesso gli articoli come l\'inglese. "Vado al lavoro" = "I go to work" (no article). "Vado al mercato" = "I go to the market" (the = specifico).',

vocab: [

    lesson:{
      title:'Key Words from Your Lessons',
      text:'Every morning, one of the two brothers would <em>oversleep</em> and miss the chance to get the free gingerbread house kit. It was never his <em>fault</em> — at least that\'s what he said. He needed to <em>earn</em> money to buy one, but his <em>savings</em> were almost gone. His room was always <em>messy</em>, unlike his brother\'s <em>neat</em> space. The teacher would <em>hand out</em> the <em>supplies</em> at the start of each class, and students who arrived late found nothing left.',
      vocab:[
        {en:'oversleep',it:'dormire troppo / svegliarsi tardi',ex:'He overslept and missed the meeting.'},
        {en:'fault',it:'colpa',ex:"It's not my fault — I was stuck in traffic."},
        {en:'earn',it:'guadagnare',ex:'She earns a competitive salary.'},
        {en:'savings',it:'risparmi',ex:'I used my savings to buy a new laptop.'},

      {type:'mc',q:'"Earnings" means:',opts:['Risparmi','Guadagni','Colpa','Scorte'],ans:1,exp:"'Earnings' = guadagni. 'Savings' = risparmi."},
      {type:'mc',q:'Which uses "weird" correctly?',opts:['He has a weird salary.','That was a weird request — I didn\'t understand it.','Weird means the same as normal.','She made a weird saving.'],ans:1,exp:"'Weird' = strano/a. 'That was a weird request.'"},

  {
    id:'v_adtech', level:3, topic:'AdTech & Digital Marketing Vocabulary',
    lesson:{
      title:'AdTech & Programmatic Advertising',

let currentSection = null;
let currentUnit = null;
let currentUnitIdx = 0;
let currentQ = 0;

let sessionQuestions = [];

function pickUnits(section) {
  const units = DB[section];
  if (!units) return [];
  const lv = S.level;
  // Weight by level proximity, include some review
  let candidates = units.filter(u => Math.abs(u.level - lv) <= 1);
  if (candidates.length === 0) candidates = units;
  // Prioritise weak topics
  candidates.sort((a,b) => {
    const wa = S.weakTopics[a.topic]||0;
    const wb = S.weakTopics[b.topic]||0;
    return wb - wa;
  });
  return candidates;
}

function buildSession(section) {
  const units = pickUnits(section);
  if (!units.length) return [];
  const qs = [];
  // Interleave: lesson card + questions from multiple units
  units.slice(0, Math.min(3, units.length)).forEach(unit => {
    qs.push({type:'lesson', unit});
    const uqs = [...unit.questions].sort(()=>Math.random()-0.5).slice(0, Math.ceil(8/Math.min(3,units.length)));
    uqs.forEach(q => qs.push({type:'question', q, topic:unit.topic, unitId:unit.id}));
  });
  return qs;
}

function renderQuestionCard(q, topic, unitId){
  const allQs = sessionQuestions.filter(s=>s.type==='question');
  const qIdx = sessionQuestions.slice(0,currentQ).filter(s=>s.type==='question').length;
  const totalQs = allQs.length;
  answered = false;

  const dotsHTML = allQs.map((_,i)=>{
    const stepIdx = sessionQuestions.findIndex((s,si)=>s.type==='question'&&sessionQuestions.slice(0,si+1).filter(x=>x.type==='question').length===i+1);
    const done = i<qIdx;
    const cur = i===qIdx;
    const wasCorrect = done && sessionQuestions[stepIdx]&&sessionQuestions[stepIdx]._result==='correct';
    return `<div class="dot ${done?(wasCorrect?'done':'wrong-dot'):cur?'current':''}"></div>`;
  }).join('');

  let inputHTML='';
  if(q.type==='mc'){
    inputHTML=`<div class="options">${q.opts.map((o,i)=>`<button class="opt" onclick="checkMC(${i})" id="opt-${i}">${o}</button>`).join('')}</div>`;
  } else {
    inputHTML=`<div class="fill-row"><input class="fill-input" id="fill-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill()"/><button class="btn-check" onclick="checkFill()">Check</button></div>`;
  }

  document.getElementById('session-area').innerHTML=`
    <div class="card">
      <div class="quiz-progress">
        <span>${qIdx+1}/${totalQs}</span>
        <div class="progress-dots">${dotsHTML}</div>
        <span>${sessionCorrect} correct</span>
      </div>
      <div class="qtag">${lvlName()} · ${topic} · ${q.type==='mc'?'Multiple choice':'Fill in'}</div>
      <div class="qtext">${q.q}</div>
      ${inputHTML}
      <div class="feedback-box" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextStep()">${qIdx+1<totalQs?'Next →':'See results →'}</button>
    </div>
  `;
}

function checkMC(idx){
  if(answered)return;
  answered=true;
  const step=sessionQuestions[currentQ];
  const q=step.q;
  document.querySelectorAll('.opt').forEach(o=>o.disabled=true);
  const correct=idx===q.ans;
  document.getElementById('opt-'+idx).classList.add(correct?'correct':'wrong');
  if(!correct)document.getElementById('opt-'+q.ans).classList.add('reveal');
  showFeedback(correct,q.exp||'');
  recordAnswer(correct,step.topic||'');
  step._result=correct?'correct':'wrong';
}

function checkFill(){
  if(answered)return;
  const input=document.getElementById('fill-input');
  if(!input)return;
  answered=true;
  const step=sessionQuestions[currentQ];
  const q=step.q;
  const val=input.value.toLowerCase().trim().replace(/[?.!,]/g,'');
  const acc=Array.isArray(q.ans)?q.ans:[q.ans];
  const correct=acc.some(a=>{const c=a.toLowerCase().trim().replace(/[?.!,]/g,'');return val===c||val.includes(c)||c.includes(val)});
  input.classList.add(correct?'correct':'wrong');
  input.disabled=true;
  showFeedback(correct,q.exp||'');
  recordAnswer(correct,step.topic||'');
  step._result=correct?'correct':'wrong';
}

function showFeedback(correct,exp){
  const fb=document.getElementById('feedback');
  fb.className='feedback-box show '+(correct?'ok':'bad');
  fb.innerHTML=`<strong>${correct?'✓ Correct!':'✗ Not quite'}</strong>${exp?' — '+exp:''}`;
  document.getElementById('next-btn').classList.add('show');
}

function nextStep(){
  currentQ++;
  renderSessionStep();
}

// ── INIT ───────────────────────────────────────────────
function updateStreak(){
  const today=new Date().toDateString();
  const yesterday=new Date(Date.now()-86400000).toDateString();
  if(S.lastDate===today)return;
  if(S.lastDate===yesterday)S.streak++;
  else S.streak=1;
  S.lastDate=today;saveS();
}
updateStreak();
updateSidebar();
showPage('home');

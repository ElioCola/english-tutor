<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Tutor · Elio's Learning App</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F5F0;
  --surface: #FFFFFF;
  --surface2: #F0EDE8;
  --border: #E2DDD6;
  --text: #1A1714;
  --muted: #7A7570;
  --accent: #2C5F4A;
  --accent-light: #E8F2EE;
  --accent2: #8B4513;
  --warn: #C0392B;
  --warn-light: #FCECEA;
  --ok: #2C5F4A;
  --ok-light: #E8F2EE;
  --gold: #B8860B;
  --gold-light: #FFF8E6;
  --radius: 12px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
h1,h2,h3 { font-family: 'Lora', serif; font-weight: 500; }

/* LAYOUT */
.shell { display: flex; min-height: 100vh; }
.sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); padding: 1.5rem 1rem; display: flex; flex-direction: column; position: fixed; top: 0; left: 0; height: 100vh; overflow-y: auto; }
.main { margin-left: 240px; flex: 1; padding: 2rem; max-width: 820px; }
.logo { font-family: 'Lora', serif; font-size: 18px; font-weight: 500; color: var(--accent); margin-bottom: 0.25rem; }
.logo-sub { font-size: 12px; color: var(--muted); margin-bottom: 1.5rem; }

/* LEVEL BADGE */
.level-badge { background: var(--accent-light); color: var(--accent); border-radius: 20px; padding: 6px 14px; font-size: 13px; font-weight: 500; text-align: center; margin-bottom: 1.25rem; }

/* STATS */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 1.5rem; }
.stat-box { background: var(--surface2); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
.stat-num { font-size: 20px; font-weight: 500; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* NAV */
.nav-section { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin: 1rem 0 0.5rem; }
.nav-item { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--muted); transition: all 0.15s; margin-bottom: 2px; border: none; background: none; width: 100%; text-align: left; }
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
.nav-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: 0.5; flex-shrink: 0; }
.nav-item.active .nav-dot { opacity: 1; }

/* PROGRESS BAR */
.xp-bar-wrap { margin-top: auto; padding-top: 1rem; border-top: 1px solid var(--border); }
.xp-label { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 6px; }
.xp-bar { height: 6px; background: var(--border); border-radius: 3px; }
.xp-fill { height: 6px; background: var(--accent); border-radius: 3px; transition: width 0.5s ease; }

/* CARDS */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
.card-sm { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin-bottom: 0.75rem; }

/* PAGE HEADER */
.page-header { margin-bottom: 1.75rem; }
.page-title { font-size: 26px; color: var(--text); margin-bottom: 4px; }
.page-sub { font-size: 14px; color: var(--muted); }

/* READING TEXT */
.reading-box { background: var(--gold-light); border: 1px solid #E8D8A0; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
.reading-label { font-size: 11px; font-weight: 500; color: var(--gold); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
.reading-text { font-family: 'Lora', serif; font-size: 15px; line-height: 1.9; color: var(--text); }
.reading-text em { background: #FFE88A; border-radius: 3px; padding: 0 3px; font-style: normal; font-weight: 500; }
.vocab-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 8px; margin-top: 1rem; }
.vocab-chip { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 8px 12px; }
.vocab-en { font-size: 13px; font-weight: 500; color: var(--text); }
.vocab-it { font-size: 12px; color: var(--muted); margin-top: 2px; }

/* GRAMMAR EXPLANATION */
.grammar-box { background: var(--accent-light); border: 1px solid #B8D4C8; border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1.25rem; }
.grammar-label { font-size: 11px; font-weight: 500; color: var(--accent); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.75rem; }
.grammar-rule { font-family: 'Lora', serif; font-size: 15px; line-height: 1.85; color: var(--text); margin-bottom: 0.75rem; }
.grammar-example { background: var(--surface); border-left: 3px solid var(--accent); padding: 10px 14px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0; margin: 8px 0; font-size: 14px; }
.grammar-example .en { font-style: italic; color: var(--text); }
.grammar-example .it { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* QUIZ */
.quiz-progress { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; font-size: 13px; color: var(--muted); }
.progress-dots { display: flex; gap: 4px; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--border); }
.dot.done { background: var(--accent); }
.dot.wrong-dot { background: var(--warn); }
.dot.current { background: var(--accent); opacity: 0.4; }
.question-tag { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 0.5rem; }
.question-text { font-family: 'Lora', serif; font-size: 17px; line-height: 1.7; color: var(--text); margin-bottom: 1.25rem; }
.options { display: flex; flex-direction: column; gap: 8px; }
.opt { padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; font-size: 14px; color: var(--text); background: var(--surface); text-align: left; transition: all 0.15s; font-family: 'DM Sans', sans-serif; }
.opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
.opt.correct { background: var(--ok-light); border-color: var(--ok); color: var(--ok); }
.opt.wrong { background: var(--warn-light); border-color: var(--warn); color: var(--warn); }
.opt.reveal { background: var(--ok-light); border-color: var(--ok); color: var(--ok); }
.fill-row { display: flex; gap: 8px; }
.fill-input { flex: 1; padding: 11px 14px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 15px; font-family: 'Lora', serif; color: var(--text); background: var(--surface); }
.fill-input:focus { outline: none; border-color: var(--accent); }
.fill-input.correct { border-color: var(--ok); background: var(--ok-light); }
.fill-input.wrong { border-color: var(--warn); background: var(--warn-light); }
.btn-check { padding: 11px 20px; border: 1px solid var(--accent); border-radius: var(--radius-sm); background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.btn-check:hover { background: #1e4a37; }
.feedback-box { margin-top: 1rem; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 14px; line-height: 1.6; display: none; }
.feedback-box.show { display: block; }
.feedback-box.ok { background: var(--ok-light); border: 1px solid #B8D4C8; color: var(--ok); }
.feedback-box.bad { background: var(--warn-light); border: 1px solid #F0B8B4; color: var(--warn); }
.next-btn { margin-top: 1rem; padding: 10px 24px; border-radius: 20px; border: 1px solid var(--accent); color: var(--accent); background: transparent; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; display: none; }
.next-btn.show { display: inline-block; }
.next-btn:hover { background: var(--accent-light); }

/* LEVEL UP */
.levelup-banner { background: var(--gold-light); border: 1px solid #E8D8A0; border-radius: var(--radius); padding: 1.25rem; margin-bottom: 1rem; text-align: center; display: none; }
.levelup-banner.show { display: block; }
.levelup-banner h3 { font-family: 'Lora', serif; font-size: 18px; color: var(--gold); margin-bottom: 4px; }
.levelup-banner p { font-size: 13px; color: var(--muted); }

/* AI LOADING */
.ai-loading { text-align: center; padding: 3rem 1rem; color: var(--muted); }
.ai-dots { display: inline-flex; gap: 6px; margin-top: 0.75rem; }
.ai-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); opacity: 0.3; animation: pulse 1.2s infinite; }
.ai-dot:nth-child(2) { animation-delay: 0.2s; }
.ai-dot:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }

/* REPORT / HOME */
.section-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px; margin-bottom: 1.5rem; }
.metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.metric-num { font-size: 32px; font-weight: 300; color: var(--accent); }
.metric-lbl { font-size: 13px; color: var(--muted); margin-top: 4px; }
.history-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
.history-row:last-child { border-bottom: none; }
.history-section { font-weight: 500; color: var(--text); }
.history-score { font-size: 13px; color: var(--muted); }
.badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.badge-ok { background: var(--ok-light); color: var(--ok); }
.badge-warn { background: var(--warn-light); color: var(--warn); }
.badge-gold { background: var(--gold-light); color: var(--gold); }

/* SHARE BOX */
.share-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.25rem; }
.share-link { font-family: monospace; font-size: 13px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--accent); word-break: break-all; margin: 0.75rem 0; }
.btn-copy { padding: 8px 18px; border: 1px solid var(--accent); border-radius: 20px; color: var(--accent); background: transparent; font-size: 13px; cursor: pointer; }
.btn-copy:hover { background: var(--accent-light); }

/* AI REVIEW BANNER */
.review-banner { background: #FFF3E0; border: 1px solid #FFB74D; border-radius: var(--radius-sm); padding: 10px 14px; font-size: 13px; color: #7B4A00; margin-bottom: 1rem; display: none; }
.review-banner.show { display: block; }

/* RESPONSIVE */
@media (max-width: 720px) {
  .sidebar { width: 200px; }
  .main { margin-left: 200px; padding: 1.25rem; }
}
@media (max-width: 560px) {
  .sidebar { display: none; }
  .main { margin-left: 0; }
}
</style>
</head>
<body>

<div class="shell">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="logo">English Tutor</div>
    <div class="logo-sub">Elio's adaptive app</div>
    <div class="level-badge" id="level-badge">Level B1+</div>
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-num" id="s-streak">0</div><div class="stat-lbl">day streak</div></div>
      <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">answered</div></div>
      <div class="stat-box"><div class="stat-num" id="s-acc">–</div><div class="stat-lbl">accuracy</div></div>
      <div class="stat-box"><div class="stat-num" id="s-xp">0</div><div class="stat-lbl">XP today</div></div>
    </div>

    <div class="nav-section">Study</div>
    <button class="nav-item active" onclick="showPage('home')" id="nav-home"><span class="nav-dot"></span>Dashboard</button>
    <button class="nav-item" onclick="showPage('vocab')" id="nav-vocab"><span class="nav-dot"></span>Vocabulary</button>
    <button class="nav-item" onclick="showPage('grammar')" id="nav-grammar"><span class="nav-dot"></span>Grammar</button>
    <button class="nav-item" onclick="showPage('reading')" id="nav-reading"><span class="nav-dot"></span>Reading</button>
    <button class="nav-item" onclick="showPage('business')" id="nav-business"><span class="nav-dot"></span>Business English</button>
    <button class="nav-item" onclick="showPage('listening')" id="nav-listening"><span class="nav-dot"></span>Listening</button>

    <div class="nav-section">Progress</div>
    <button class="nav-item" onclick="showPage('report')" id="nav-report"><span class="nav-dot"></span>My report</button>
    <button class="nav-item" onclick="showPage('share')" id="nav-share"><span class="nav-dot"></span>Share with teacher</button>

    <div class="xp-bar-wrap">
      <div class="xp-label"><span>XP to next level</span><span id="xp-text">0/100</span></div>
      <div class="xp-bar"><div class="xp-fill" id="xp-fill" style="width:0%"></div></div>
    </div>
  </aside>

  <!-- MAIN CONTENT -->
  <main class="main" id="main-content">
    <!-- Pages injected here -->
  </main>
</div>

<script>
// ============================================================
//  STATE & PERSISTENCE
// ============================================================
const STORAGE_KEY = 'elio_english_tutor_v2';

function defaultState() {
  return {
    level: 2, // 1=A2, 2=B1, 3=B1+, 4=B2, 5=B2+, 6=C1
    xp: 0,
    xpTotal: 0,
    streak: 0,
    lastDate: '',
    totalAnswered: 0,
    totalCorrect: 0,
    sessions: [],
    weakTopics: {},
    strongTopics: {},
    history: [],
    consecutiveCorrect: 0,
    consecutiveWrong: 0,
    currentSection: 'vocab',
    learnedVocab: [],
    reviewQueue: [],
  };
}

let state = loadState();
function loadState() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || defaultState(); } catch { return defaultState(); }
}
function saveState() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function exportState() { return btoa(JSON.stringify(state)); }

const LEVEL_NAMES = ['', 'A2', 'B1', 'B1+', 'B2', 'B2+', 'C1'];
const XP_PER_LEVEL = [0, 0, 80, 150, 250, 400, 600];

function getCurrentLevel() { return LEVEL_NAMES[state.level] || 'B1'; }

function addXP(pts) {
  state.xp += pts;
  state.xpTotal += pts;
  const needed = XP_PER_LEVEL[state.level + 1] || 999;
  if (state.xp >= needed && state.level < 6) {
    state.level++;
    state.xp = 0;
    showLevelUp();
  }
  updateSidebarStats();
  saveState();
}

function updateSidebarStats() {
  document.getElementById('level-badge').textContent = 'Level ' + getCurrentLevel();
  document.getElementById('s-streak').textContent = state.streak;
  document.getElementById('s-total').textContent = state.totalAnswered;
  const acc = state.totalAnswered ? Math.round(state.totalCorrect / state.totalAnswered * 100) + '%' : '–';
  document.getElementById('s-acc').textContent = acc;
  const today = new Date().toDateString();
  const todayXp = state.sessions.filter(s => s.date === today).reduce((a,b) => a + (b.xp||0), 0);
  document.getElementById('s-xp').textContent = todayXp || state.xp;
  const needed = XP_PER_LEVEL[state.level + 1] || 100;
  document.getElementById('xp-fill').style.width = Math.min(100, Math.round(state.xp / needed * 100)) + '%';
  document.getElementById('xp-text').textContent = state.xp + '/' + needed;
}

// ============================================================
//  CURRICULUM DATA (Base, enriched by AI)
// ============================================================
const CURRICULUM = {
  vocab: {
    A2: [
      { en:'oversleep', it:'dormire più del dovuto', ex:'I overslept and was late to work.' },
      { en:'supplies', it:'scorte / materiali', ex:'We ran out of office supplies.' },
      { en:'fault', it:'colpa', ex:"It's not my fault — I told you yesterday." },
      { en:'earn', it:'guadagnare', ex:'She earns a good salary as a project manager.' },
      { en:'earnings', it:'guadagni', ex:'His earnings doubled after the promotion.' },
      { en:'savings', it:'risparmi', ex:'I used my savings to buy a laptop.' },
      { en:'weird', it:'strano', ex:'That was a weird email to receive on a Friday.' },
      { en:'make it on time', it:'farcela in tempo', ex:"We need to leave now or we won't make it on time." },
      { en:'being late', it:'essere in ritardo', ex:'Being late to an interview is a bad start.' },
      { en:'hand out', it:'distribuire', ex:'Please hand out the documents to everyone.' },
      { en:'messy', it:'disordinato', ex:'His desk is always messy but he knows where everything is.' },
      { en:'neat', it:'ordinato / pulito', ex:'She keeps her workspace very neat.' },
    ],
    B1: [
      { en:'deadline', it:'scadenza', ex:'The deadline for this report is Friday at noon.' },
      { en:'colleague', it:'collega', ex:'I asked a colleague to review my presentation.' },
      { en:'feedback', it:'riscontro / commento', ex:'The manager gave helpful feedback on my work.' },
      { en:'workload', it:'carico di lavoro', ex:'My workload increased after the merger.' },
      { en:'implement', it:'implementare', ex:'We plan to implement the new system next month.' },
      { en:'outcome', it:'risultato / esito', ex:'The outcome of the meeting was positive.' },
      { en:'resolve', it:'risolvere', ex:'We need to resolve this issue before the client call.' },
      { en:'straightforward', it:'semplice / chiaro', ex:'The installation process is quite straightforward.' },
    ],
    B2: [
      { en:'stakeholder', it:'portatore di interesse', ex:'All stakeholders were invited to the presentation.' },
      { en:'leverage', it:'sfruttare (strategicamente)', ex:'We can leverage our data to improve targeting.' },
      { en:'benchmark', it:'punto di riferimento', ex:'Let\'s benchmark our performance against competitors.' },
      { en:'scalable', it:'scalabile', ex:'The solution needs to be scalable across 21 markets.' },
      { en:'ROI (return on investment)', it:'ritorno sull\'investimento', ex:'The campaign delivered a strong ROI.' },
      { en:'pipeline', it:'pipeline / flusso di lavoro', ex:'We have several deals in the pipeline.' },
      { en:'iterate', it:'ripetere / migliorare progressivamente', ex:'We iterated on the product based on user feedback.' },
    ],
  },
  grammar: {
    A2: [
      {
        id: 'present_perfect_intro',
        title: 'Present Perfect — Introduction',
        rule: 'We use the Present Perfect (have/has + past participle) for actions that happened in the past but are relevant NOW, or for experiences without a specific time.',
        examples: [
          { en: 'I have never shared my bedroom.', it: 'Non ho mai condiviso la mia camera.' },
          { en: "She hasn't finished the report yet.", it: 'Non ha ancora finito il rapporto.' },
          { en: 'Have you ever worked abroad?', it: 'Hai mai lavorato all\'estero?' },
        ],
        common_error: "Italians often say: 'I didn't finish yet' ❌ → correct: 'I haven't finished yet' ✓",
        questions: [
          { type:'mc', q:'Which sentence is correct?', opts:['I didn\'t never do that.','I have never done that.','I never did never that.','I haven\'t never done that.'], ans:1, exp:"'Never' + Present Perfect: 'I have never done that.' Double negatives are wrong in English." },
          { type:'mc', q:'Choose the correct form: "She ___ already sent the email."', opts:['did','has','was','have'], ans:1, exp:"Subject 'she' uses 'has' in Present Perfect: 'She has already sent the email.'" },
          { type:'fill', q:'Complete: "I ___ (not/read) a book for a long time."', ans:["haven't read","have not read"], exp:"Present Perfect negative: 'I haven't read a book for a long time.'" },
          { type:'mc', q:'"Have you ever ___ to Dublin?" — choose the correct verb form.', opts:['go','went','gone','goes'], ans:2, exp:"Present Perfect uses past participle: 'Have you ever GONE to Dublin?'" },
          { type:'mc', q:'Which time expression goes with Present Perfect?', opts:['yesterday','last week','in 2020','already'], ans:3, exp:"'Already', 'yet', 'ever', 'never', 'just', 'for', 'since' go with Present Perfect. 'Yesterday/last week/in 2020' go with Past Simple." },
          { type:'fill', q:'Make it Present Perfect: "He read the report." → "He ___ the report."', ans:["has read"], exp:"He has read the report. (Past participle of 'read' is 'read' — same spelling, different pronunciation: /rɛd/)" },
        ]
      },
      {
        id: 'past_simple_basics',
        title: 'Past Simple — Regular & Irregular Verbs',
        rule: 'Past Simple describes completed actions at a specific time in the past. Regular verbs add -ed. Many common verbs are irregular.',
        examples: [
          { en: 'They did not make it on time.', it: 'Non ce la fecero in tempo.' },
          { en: 'He forgot his shoe because he was late.', it: 'Dimenticò la scarpa perché era in ritardo.' },
          { en: 'Did they make it on time? No, they didn\'t.', it: 'Arrivarono in tempo? No.' },
        ],
        common_error: "Don't say: 'He didn't forgot' ❌ → 'He didn't forget' ✓ (base verb after did/didn't)",
        questions: [
          { type:'mc', q:'"Did they make it on time?" — Choose the correct short answer.', opts:["Yes, they made.","No, they didn't.","No, they didn't made.","No, they not did."], ans:1, exp:"Short answer: 'No, they didn't.' Never repeat the main verb in short answers." },
          { type:'fill', q:'Complete: "He ___ (not/forget) his keys — he forgot his shoes."', ans:["didn't forget","did not forget"], exp:"Negative Past Simple: didn't + BASE verb. Not 'didn't forgot'." },
          { type:'mc', q:'Which is the Past Simple of "oversleep"?', opts:['oversleeped','overslept','did oversleep','was overslept'], ans:1, exp:"'Oversleep' is irregular: oversleep → overslept (like sleep → slept)." },
          { type:'mc', q:'Choose the correct question form:', opts:['Where did he went?','Where he went?','Where did he go?','Where has he went?'], ans:2, exp:"Question with 'did': did + subject + BASE verb. 'Where did he go?'" },
        ]
      },
      {
        id: 'prepositions_time',
        title: 'Prepositions: for, since, from',
        rule: '"For" is used with a duration of time. "Since" is used with a starting point. "From" is NOT used for duration in English (common Italian mistake).',
        examples: [
          { en: 'I have studied English for three years.', it: 'Studio inglese da tre anni.' },
          { en: 'I have lived in Milan since 2018.', it: 'Vivo a Milano dal 2018.' },
          { en: "I haven't read a book for a long time.", it: 'Non leggo un libro da molto tempo.' },
        ],
        common_error: "Italians often say 'from many time' ❌ → correct: 'for a long time' ✓",
        questions: [
          { type:'mc', q:'"I have studied English ___ 2022."', opts:['for','from','since','during'], ans:2, exp:"'Since' + specific point in time: 'I have studied English since 2022.'" },
          { type:'mc', q:'"I have studied English ___ three years."', opts:['since','from','during','for'], ans:3, exp:"'For' + duration: 'I have studied English for three years.'" },
          { type:'fill', q:'Correct this: "I don\'t read from many time." → "I ___ for a long time."', ans:["haven't read a book for a long time","haven't read for a long time","have not read for a long time"], exp:"Two corrections: (1) Present Perfect, (2) 'for' not 'from'." },
          { type:'mc', q:'Which sentence is correct?', opts:["She works here from 10 years.","She has worked here for 10 years.","She works here since 10 years.","She worked here for 10 years already."], ans:1, exp:"'She has worked here for 10 years.' — ongoing situation uses Present Perfect + 'for'." },
        ]
      },
      {
        id: 'negation_double',
        title: 'No double negatives in English',
        rule: 'In English, you can NEVER use two negatives in the same clause. Unlike Italian ("non ho mai fatto"), in English you choose ONE: "I have never done it" OR "I haven\'t done it."',
        examples: [
          { en: "I have never shared my room.", it: "Non ho mai condiviso la mia stanza." },
          { en: "He doesn't have any money.", it: "Non ha (nessun) soldi." },
          { en: "I don't know anything.", it: "Non so niente." },
        ],
        common_error: "❌ 'I don't have no money' — ✓ 'I don't have any money' or 'I have no money'",
        questions: [
          { type:'mc', q:'Choose the correct sentence:', opts:["I don't have no time.","I have no time.","I haven't no time.","I don't have none time."], ans:1, exp:"'I have no time' ✓ or 'I don't have any time' ✓ — never combine 'don't' with 'no'." },
          { type:'mc', q:'"She ___ anything about the project."', opts:["doesn't know nothing","don't know nothing","doesn't know anything","isn't knowing nothing"], ans:2, exp:"'She doesn't know anything.' — negative verb + 'any-' words." },
          { type:'fill', q:'Correct: "He doesn\'t have no experience." → "He doesn\'t have ___ experience."', ans:["any"], exp:"'He doesn't have any experience.' 'Any' replaces 'no' when the verb is already negative." },
        ]
      },
    ],
    B1: [
      {
        id: 'present_perfect_vs_simple',
        title: 'Present Perfect vs Past Simple — The Key Difference',
        rule: 'Past Simple = specific time in the past (finished). Present Perfect = connection to the present, no specific time, or with "ever/never/already/yet/just/for/since".',
        examples: [
          { en: 'I visited Dublin in 2022.', it: 'Ho visitato Dublino nel 2022. (specifico)' },
          { en: 'I have visited Dublin three times.', it: 'Ho visitato Dublino tre volte. (esperienza, no tempo)' },
          { en: 'Have you finished? — Yes, I just finished.', it: 'Hai finito? — Sì, ho appena finito.' },
        ],
        common_error: "❌ 'Did you ever go to London?' → ✓ 'Have you ever been to London?'",
        questions: [
          { type:'mc', q:'"___ you ever ___ sushi?" (experience question)', opts:['Did / eat','Have / eaten','Did / eaten','Have / ate'], ans:1, exp:"Experience questions use Present Perfect: 'Have you ever eaten sushi?'" },
          { type:'mc', q:'"When ___ you ___ the email?" (specific time implied)', opts:['have / sent','did / send','have / send','did / sent'], ans:1, exp:"'When' + specific time = Past Simple: 'When did you send the email?'" },
          { type:'fill', q:'"I ___ (just/finish) the presentation." Complete with Present Perfect.', ans:["have just finished","'ve just finished"], exp:"'I have just finished the presentation.' 'Just' goes between have/has and the past participle." },
          { type:'mc', q:'Which sentence is correct in a job interview context?', opts:["I worked in AdTech for 8 years and I still work there.","I have worked in AdTech for 8 years and I still work there.","I was working in AdTech for 8 years and I still work there.","I work in AdTech since 8 years."], ans:1, exp:"Ongoing situation from past to present = Present Perfect: 'I have worked in AdTech for 8 years.' KEY for interviews!" },
          { type:'mc', q:'"The client ___ (not/reply) yet. I\'ll follow up."', opts:['didn\'t reply','hasn\'t replied','wasn\'t replied','don\'t replied'], ans:1, exp:"'Yet' signals Present Perfect: 'The client hasn't replied yet.'" },
        ]
      },
      {
        id: 'conditionals_1',
        title: 'First Conditional — Real possibilities',
        rule: 'If + Present Simple, will + base verb. Used for real, likely situations in the future.',
        examples: [
          { en: 'If you make it on time, the kits are free.', it: 'Se arrivi in tempo, i kit sono gratis.' },
          { en: "If I get the job, I'll move to Dublin.", it: 'Se ottengo il lavoro, mi trasferirò a Dublino.' },
          { en: "If the campaign performs well, the client will increase the budget.", it: "Se la campagna va bene, il cliente aumenterà il budget." },
        ],
        common_error: "❌ 'If I will go...' — Never use 'will' in the IF clause!",
        questions: [
          { type:'mc', q:'"If the meeting ___ at 3pm, I\'ll be there."', opts:['will start','starts','is starting','started'], ans:1, exp:"'If' clause = Present Simple (never will). 'If the meeting starts at 3pm...'" },
          { type:'mc', q:'Complete: "If she ___ the report, the boss ___ happy."', opts:['sends / will be','will send / is','sent / will be','sends / would be'], ans:0, exp:"First conditional: If + Present Simple, will + base. 'If she sends the report, the boss will be happy.'" },
          { type:'fill', q:'"If you don\'t reply, I ___ (follow) up tomorrow."', ans:["will follow","'ll follow"], exp:"'If you don't reply, I will follow up tomorrow.' — result clause uses 'will'." },
        ]
      },
      {
        id: 'modal_verbs',
        title: 'Modal Verbs — can, could, should, must, might',
        rule: 'Modal verbs are followed by the BASE verb (no -s, no -ed, no -ing). They express ability, possibility, obligation, advice.',
        examples: [
          { en: 'You should always confirm the meeting in writing.', it: 'Dovresti sempre confermare la riunione per iscritto.' },
          { en: 'The client might increase the budget next quarter.', it: 'Il cliente potrebbe aumentare il budget il prossimo trimestre.' },
          { en: 'Can you send me the report by Friday?', it: 'Puoi mandarmi il report entro venerdì?' },
        ],
        common_error: "❌ 'She should to go' — ✓ 'She should go'. No 'to' after modals!",
        questions: [
          { type:'mc', q:'"You ___ send a follow-up email after the interview."', opts:['should to','should','must to','can to'], ans:1, exp:"'Should' + base verb, no 'to'. 'You should send a follow-up email.'" },
          { type:'mc', q:'"The campaign results ___ improve next week." (possibility)', opts:['might','must','should to','can to'], ans:0, exp:"'Might' = possibility. 'The campaign results might improve next week.'" },
          { type:'fill', q:'"___ you help me prepare for the interview?" (polite request)', ans:["could","can"], exp:"'Could you help me...' is more polite than 'Can you help me...'" },
          { type:'mc', q:'Which sentence is grammatically correct?', opts:["She can speaks English fluently.","She can speak English fluently.","She cans speak English fluently.","She can to speak English fluently."], ans:1, exp:"Modal + base verb: 'She can speak English fluently.' No -s, no 'to', no -ing after modals." },
        ]
      },
    ],
    B2: [
      {
        id: 'conditionals_2_3',
        title: 'Second & Third Conditional',
        rule: 'Second conditional: If + Past Simple, would + base → hypothetical/unlikely present/future. Third conditional: If + Past Perfect, would have + past participle → impossible past.',
        examples: [
          { en: "If I were fluent in English, I'd apply for the Google role.", it: "Se fossi fluente in inglese, mi candiderei per il ruolo Google." },
          { en: "If I had prepared more, I would have passed the interview.", it: "Se mi fossi preparato di più, avrei superato il colloquio." },
        ],
        common_error: "❌ 'If I would have...' in the IF clause — NEVER use 'would' in the IF clause!",
        questions: [
          { type:'mc', q:'"If I ___ the CEO, I ___ invest more in AdTech."', opts:['was/will','were/would','am/would','was/would have'], ans:1, exp:"Second conditional: 'If I were the CEO, I would invest more in AdTech.' 'Were' (not 'was') is formally correct for all subjects." },
          { type:'mc', q:'"If you ___ earlier, you ___ the discount."', opts:['had applied / would have received','applied / would receive','would apply / had received','apply / will receive'], ans:0, exp:"Third conditional (past impossible): 'If you had applied earlier, you would have received the discount.'" },
          { type:'fill', q:'"If they ___ (offer) me the Dublin job, I ___ (accept) it immediately." (real/likely)', ans:["offer / will accept","offer, I'll accept","offer / 'll accept"], exp:"First conditional (real possibility): 'If they offer me the job, I will accept it immediately.'" },
        ]
      },
      {
        id: 'passive_voice',
        title: 'Passive Voice',
        rule: 'Passive: subject + be + past participle. Used when the action is more important than who does it, or when the doer is unknown.',
        examples: [
          { en: 'The campaign was launched in January.', it: 'La campagna è stata lanciata a gennaio.' },
          { en: 'The budget has been increased by the client.', it: 'Il budget è stato aumentato dal cliente.' },
          { en: 'Ads are targeted based on user behaviour.', it: 'Gli annunci vengono targettizzati in base al comportamento degli utenti.' },
        ],
        common_error: "❌ 'The report was written from me' → ✓ 'The report was written BY me'",
        questions: [
          { type:'mc', q:'"The results ___ (analyse) by the data team every week."', opts:['are analysed','are analysing','have analysed','analyse'], ans:0, exp:"Passive present simple: 'The results are analysed by the data team every week.'" },
          { type:'mc', q:'"The presentation ___ (prepare) before the meeting." (past, passive)', opts:['was prepared','prepared','has prepared','were prepared'], ans:0, exp:"Past simple passive: 'The presentation was prepared before the meeting.'" },
          { type:'fill', q:'Make passive: "Google rejected the application." → "The application ___ ___ by Google."', ans:["was rejected"], exp:"Past simple passive: 'The application was rejected by Google.'" },
        ]
      },
    ],
  }
};

const SYSTEM_PROMPT = `You are an expert English language tutor. The student is an Italian professional named Elio at approximately B1-B1+ level, aiming for C1 for professional use in AdTech/tech interviews.

Generate a JSON array of quiz questions. Each question object must have:
- type: "mc" (multiple choice) or "fill" (fill in the blank)
- q: the question text in English
- For "mc": opts (array of 4 options), ans (index 0-3 of correct answer)
- For "fill": ans (array of acceptable answers, lowercase, no punctuation)
- exp: explanation in Italian + English (max 3 sentences, very clear)
- topic: the grammar/vocab topic being tested
- level: "A2", "B1", "B1+", "B2", or "C1"

Respond ONLY with valid JSON array, no markdown, no backticks, no preamble.`;

async function generateAIQuestions(section, topic, level, count=5) {
  const levelName = LEVEL_NAMES[level] || 'B1';
  const prompt = `Generate ${count} quiz questions for the section "${section}" on topic "${topic}" at level ${levelName}. 
The student's weak areas are: ${JSON.stringify(Object.keys(state.weakTopics).slice(0,3))}.
Mix question types. Make them relevant to professional/business English for an AdTech professional.
Include at least one question referencing the student's lesson material about: gingerbread house story, bedroom sharing story, words like oversleep/earnings/weird/fault/supplies.
Also include broader questions appropriate for level ${levelName}.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: SYSTEM_PROMPT,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (!response.ok) throw new Error('API error ' + response.status);
  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function generateReadingText(topic, level) {
  const levelName = LEVEL_NAMES[level] || 'B1';
  const prompt = `Write a short reading passage (100-150 words) in English at ${levelName} level about the topic: "${topic}". 
The passage should be relevant to a professional working in AdTech/digital marketing.
Then provide a JSON response with:
- "text": the passage (wrap key vocabulary words in <em> tags)
- "title": a short title
- "vocab": array of {en, it, ex} for 6 key words from the passage
Respond ONLY with valid JSON, no markdown.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

async function generateGrammarLesson(topic, level) {
  const levelName = LEVEL_NAMES[level] || 'B1';
  const prompt = `Create a grammar explanation for an Italian B1+ English learner about: "${topic}" at ${levelName} level.
Return JSON with:
- "title": lesson title
- "rule": explanation in simple English (2-3 sentences)
- "rule_it": brief Italian note on the key difference from Italian
- "examples": array of {en, it} (4 examples)
- "common_error": one common Italian mistake with correction
Respond ONLY with valid JSON.`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {

    })

  const data = await response.json();
  const text = data.content.map(b => b.text || '').join('');
  const clean = text.replace(/```json|```/g, '').trim();
  return JSON.parse(clean);
}

function getLevelKey(level) {
  const keys = ['', 'A2', 'B1', 'B1p', 'B2', 'B2p', 'C1'];
  return keys[level] || 'B1';
}

function selectTopic(section) {
  const levelKey = getLevelKey(state.level);
  const sectionTopics = TOPICS[section] && TOPICS[section][levelKey];
  if (!sectionTopics) return 'general English';

  // Weight towards weak topics
  const weakInSection = Object.keys(state.weakTopics).filter(t => sectionTopics.includes(t));
  if (weakInSection.length > 0 && Math.random() < 0.4) {
    return weakInSection[Math.floor(Math.random() * weakInSection.length)];
  }

  // Occasionally review lower-level topics for consolidation
  if (Math.random() < 0.15 && state.level > 2) {
    const lowerKey = getLevelKey(state.level - 1);
    const lowerTopics = TOPICS[section] && TOPICS[section][lowerKey];
    if (lowerTopics) return lowerTopics[Math.floor(Math.random() * lowerTopics.length)];
  }

  return sectionTopics[Math.floor(Math.random() * sectionTopics.length)];
}

// STUDY PAGE (vocab / grammar / business / listening / reading)
let currentQuizData = null;
let currentQ = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let answered = false;

async function renderStudyPage(section) {
  const topic = selectTopic(section);
  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <h1 class="page-title" style="font-family:'Lora',serif">${section.charAt(0).toUpperCase()+section.slice(1)}</h1>
      <div class="page-sub">Topic: <strong>${topic}</strong> · Level ${getCurrentLevel()}</div>
    </div>
    <div id="study-body">
      <div class="ai-loading">
        <div style="font-family:'Lora',serif;font-size:18px;color:var(--accent)">Preparing your lesson…</div>
        <div class="ai-dots"><div class="ai-dot"></div><div class="ai-dot"></div><div class="ai-dot"></div></div>
        <div style="font-size:13px;color:var(--muted);margin-top:0.75rem">Building exercises tailored to your level ${getCurrentLevel()}</div>
      </div>
    </div>
  `;

  try {
    // Check if we have a static grammar lesson first
    const staticLesson = getStaticGrammarLesson(section, topic);

    // Load reading + vocab
    let readingHTML = '';
    if (['vocab','reading','grammar','business','listening'].includes(section)) {
      try {
        const readingData = await generateReadingText(topic, state.level);
        readingHTML = renderReadingBox(readingData);
      } catch(e) { /* skip if fails */ }
    }

    // Load grammar explanation (static or AI)
    let grammarHTML = '';
    if (section === 'grammar' || Math.random() < 0.5) {
      if (staticLesson) {
        grammarHTML = renderGrammarBox(staticLesson);
      } else {
        try {
          const grammarData = await generateGrammarLesson(topic, state.level);
          grammarHTML = renderGrammarBox(grammarData);
        } catch(e) {}
      }
    }

    // Generate questions
    let questions = [];
    if (staticLesson && staticLesson.questions) {
      questions = staticLesson.questions;
    }
    // Always supplement with AI questions
    try {
      const aiQs = await generateAIQuestions(section, topic, state.level, 5);
      questions = [...questions, ...aiQs];
    } catch(e) {
      if (questions.length === 0) {
        document.getElementById('study-body').innerHTML = `<div class="card" style="text-align:center;color:var(--muted)">
          <p style="font-family:'Lora',serif;font-size:17px;margin-bottom:0.5rem">Questions unavailable</p>
          <p style="font-size:13px">Check your internet connection and try again.</p>
          <button onclick="renderStudyPage('${section}')" style="margin-top:1rem;padding:10px 20px;border:1px solid var(--accent);border-radius:20px;color:var(--accent);background:transparent;cursor:pointer">Retry</button>
        </div>`;
        return;
      }
    }

    // Shuffle
    questions = questions.sort(() => Math.random() - 0.5).slice(0, 8);

    currentQuizData = { section, topic, questions };
    currentQ = 0;
    sessionCorrect = 0;
    sessionTotal = 0;
    answered = false;

    const reviewNote = Object.keys(state.weakTopics).includes(topic)
      ? `<div class="review-banner show">📌 You struggled with <strong>${topic}</strong> before. Let's reinforce it!</div>` : '';

    document.getElementById('study-body').innerHTML = `
      ${reviewNote}
      ${readingHTML}
      ${grammarHTML}
      <div id="levelup-banner" class="levelup-banner"></div>
      <div id="quiz-area"></div>
    `;
    renderCurrentQuestion();

  } catch(err) {
    document.getElementById('study-body').innerHTML = `<div class="card" style="text-align:center;color:var(--muted)">
      <p>Something went wrong: ${err.message}</p>
      <button onclick="renderStudyPage('${section}')" style="margin-top:1rem;padding:10px 20px;border:1px solid var(--accent);border-radius:20px;color:var(--accent);background:transparent;cursor:pointer">Retry</button>
    </div>`;
  }
}

function getStaticGrammarLesson(section, topic) {
  if (section !== 'grammar') return null;
  const levelKey = getLevelKey(state.level);
  const lessons = CURRICULUM.grammar[levelKey === 'B1p' ? 'B1' : levelKey] || CURRICULUM.grammar['B1'];
  if (!lessons) return null;
  return lessons[Math.floor(Math.random() * lessons.length)];
}

function renderReadingBox(data) {
  if (!data || !data.text) return '';
  const vocabItems = (data.vocab || []).map(v => `
    <div class="vocab-chip">
      <div class="vocab-en">${v.en}</div>
      <div class="vocab-it">${v.it}</div>
      ${v.ex ? `<div class="vocab-it" style="margin-top:4px;font-style:italic">"${v.ex}"</div>` : ''}
    </div>`).join('');

  return `<div class="reading-box">
    <div class="reading-label">📖 Reading — ${data.title || 'Read and learn'}</div>
    <div class="reading-text">${data.text}</div>
    ${vocabItems ? `<div class="vocab-grid" style="margin-top:1rem">${vocabItems}</div>` : ''}
  </div>`;
}

function renderGrammarBox(lesson) {
  if (!lesson) return '';
  const examples = (lesson.examples || []).map(e => `
    <div class="grammar-example">
      <div class="en">✦ ${e.en}</div>
      <div class="it">${e.it}</div>
    </div>`).join('');

  return `<div class="grammar-box">
    <div class="grammar-label">📚 Grammar — ${lesson.title || ''}</div>
    <div class="grammar-rule">${lesson.rule || ''}</div>
    ${lesson.rule_it ? `<div style="font-size:13px;color:var(--accent);margin-bottom:0.5rem;font-style:italic">🇮🇹 ${lesson.rule_it}</div>` : ''}
    ${examples}
    ${lesson.common_error ? `<div style="margin-top:0.75rem;font-size:13px;color:var(--warn);background:var(--warn-light);padding:10px 14px;border-radius:var(--radius-sm)">${lesson.common_error}</div>` : ''}
  </div>`;
}

function renderCurrentQuestion() {
  if (!currentQuizData) return;
  const { questions, section, topic } = currentQuizData;
  if (currentQ >= questions.length) {
    renderSessionResult();
    return;
  }
  const q = questions[currentQ];
  answered = false;

  const dotsHTML = questions.map((_, i) => {
    const cls = i < currentQ ? (questions[i]._result === 'correct' ? 'done' : 'wrong-dot') : i === currentQ ? 'current' : '';
    return `<div class="dot ${cls}"></div>`;
  }).join('');

  let inputHTML = '';
  if (q.type === 'mc') {
    inputHTML = `<div class="options">${(q.opts || []).map((o, i) =>
      `<button class="opt" onclick="checkMC(${i})" id="opt-${i}">${o}</button>`
    ).join('')}</div>`;
  } else {
    inputHTML = `<div class="fill-row">
      <input class="fill-input" id="fill-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter')checkFill()" />
      <button class="btn-check" onclick="checkFill()">Check</button>
    </div>`;
  }

  document.getElementById('quiz-area').innerHTML = `
    <div class="card">
      <div class="quiz-progress">
        <span style="font-size:13px;color:var(--muted)">${currentQ + 1} / ${questions.length}</span>
        <div class="progress-dots">${dotsHTML}</div>
        <span style="font-size:13px;color:var(--muted)">${sessionCorrect} correct</span>
      </div>
      <div class="question-tag">${q.level || getCurrentLevel()} · ${q.type === 'mc' ? 'Multiple choice' : 'Fill in'}</div>
      <div class="question-text">${q.q}</div>
      ${inputHTML}
      <div class="feedback-box" id="feedback"></div>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()">${currentQ + 1 < questions.length ? 'Next →' : 'See results →'}</button>
    </div>
  `;
}

function checkMC(idx) {
  if (answered) return;
  answered = true;
  const q = currentQuizData.questions[currentQ];
  const opts = document.querySelectorAll('.opt');
  opts.forEach(o => o.disabled = true);
  const correct = idx === q.ans;
  document.getElementById(`opt-${idx}`).classList.add(correct ? 'correct' : 'wrong');
  if (!correct) document.getElementById(`opt-${q.ans}`).classList.add('reveal');
  showFeedback(correct, q.exp || '');
  recordAnswer(correct, q.topic || currentQuizData.topic);
  q._result = correct ? 'correct' : 'wrong';
}

function checkFill() {
  if (answered) return;
  const input = document.getElementById('fill-input');
  if (!input) return;
  answered = true;
  const q = currentQuizData.questions[currentQ];
  const val = input.value.toLowerCase().trim().replace(/[?.!,]/g, '');
  const acceptableAnswers = Array.isArray(q.ans) ? q.ans : [q.ans];
  const correct = acceptableAnswers.some(a => {
    const clean = a.toLowerCase().trim().replace(/[?.!,]/g, '');
    return val === clean || val.includes(clean) || clean.includes(val);
  });
  input.classList.add(correct ? 'correct' : 'wrong');
  input.disabled = true;
  showFeedback(correct, q.exp || '');
  recordAnswer(correct, q.topic || currentQuizData.topic);
  q._result = correct ? 'correct' : 'wrong';
}

function showFeedback(correct, explanation) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback-box show ' + (correct ? 'ok' : 'bad');
  fb.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Not quite'}</strong>${explanation ? ' — ' + explanation : ''}`;
  document.getElementById('next-btn').classList.add('show');
}

function recordAnswer(correct, topic) {
  state.totalAnswered++;
  if (correct) {
    state.totalCorrect++;
    sessionCorrect++;
    state.consecutiveCorrect++;
    state.consecutiveWrong = 0;
    state.strongTopics[topic] = (state.strongTopics[topic] || 0) + 1;
    if (state.weakTopics[topic]) {
      state.weakTopics[topic]--;
      if (state.weakTopics[topic] <= 0) delete state.weakTopics[topic];
    }
    addXP(correct ? 10 : 0);
  } else {
    sessionTotal++;
    state.consecutiveWrong++;
    state.consecutiveCorrect = 0;
    state.weakTopics[topic] = (state.weakTopics[topic] || 0) + 1;
  }

  // Level adjustment
  if (state.consecutiveCorrect >= 8 && state.level < 6) {
    state.level++;
    state.consecutiveCorrect = 0;
    showLevelUp();
  } else if (state.consecutiveWrong >= 5 && state.level > 1) {
    state.level--;
    state.consecutiveWrong = 0;
  }

  updateSidebarStats();
  saveState();
}

function nextQuestion() {
  currentQ++;
  renderCurrentQuestion();
}

function renderSessionResult() {
  const { section, topic, questions } = currentQuizData;
  const total = questions.length;
  const pct = Math.round(sessionCorrect / total * 100);
  const msg = pct >= 80 ? 'Excellent work! 🎉' : pct >= 60 ? 'Good effort — keep going!' : 'Keep practising — every session helps!';

  state.history.push({ section, topic, correct: sessionCorrect, total, date: new Date().toLocaleDateString() });
  state.sessions.push({ date: new Date().toDateString(), xp: sessionCorrect * 10 });
  saveState();

  document.getElementById('quiz-area').innerHTML = `
    <div class="card" style="text-align:center;padding:2rem">
      <div style="font-family:'Lora',serif;font-size:36px;color:var(--accent);margin-bottom:4px">${sessionCorrect}/${total}</div>
      <div style="font-size:14px;color:var(--muted);margin-bottom:0.5rem">${pct}% correct — ${msg}</div>
      <div style="display:flex;justify-content:center;gap:12px;margin-top:1.5rem">
        <button onclick="renderStudyPage('${section}')" class="btn-check">New questions →</button>
        <button onclick="showPage('home')" style="padding:11px 20px;border:1px solid var(--border);border-radius:var(--radius-sm);background:transparent;color:var(--text);font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif">Dashboard</button>
      </div>
    </div>
  `;
}

function showLevelUp() {
  const el = document.getElementById('levelup-banner');
  if (!el) return;
  el.classList.add('show');
  el.innerHTML = `<h3>Level Up! 🎉</h3><p>You've reached <strong>${getCurrentLevel()}</strong>. Your exercises will now be more challenging.</p>`;
  setTimeout(() => el.classList.remove('show'), 4000);
}

// REPORT
function renderReport() {
  const acc = state.totalAnswered ? Math.round(state.totalCorrect / state.totalAnswered * 100) : 0;
  const weakList = Object.entries(state.weakTopics).sort((a,b) => b[1]-a[1]).slice(0,5);
  const strongList = Object.entries(state.strongTopics).sort((a,b) => b[1]-a[1]).slice(0,5);

  document.getElementById('main-content').innerHTML = `
    <div class="page-header">
      <h1 class="page-title" style="font-family:'Lora',serif">My progress report</h1>
      <div class="page-sub">Generated on ${new Date().toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'})}</div>
    </div>
    <div class="section-grid">
      <div class="metric-card"><div class="metric-num">${state.totalAnswered}</div><div class="metric-lbl">Questions answered</div></div>
      <div class="metric-card"><div class="metric-num">${acc}%</div><div class="metric-lbl">Accuracy</div></div>
      <div class="metric-card"><div class="metric-num">${getCurrentLevel()}</div><div class="metric-lbl">Current level</div></div>
      <div class="metric-card"><div class="metric-num">${state.xpTotal}</div><div class="metric-lbl">Total XP earned</div></div>
    </div>
    ${weakList.length > 0 ? `<div class="card">
      <h3 style="margin-bottom:0.75rem;font-size:16px">Topics to strengthen</h3>
      ${weakList.map(([t,n]) => `<div class="history-row"><span class="history-section">${t}</span><span class="badge badge-warn">${n} errors</span></div>`).join('')}
    </div>` : ''}
    ${strongList.length > 0 ? `<div class="card">
      <h3 style="margin-bottom:0.75rem;font-size:16px">Strong areas</h3>
      ${strongList.map(([t,n]) => `<div class="history-row"><span class="history-section">${t}</span><span class="badge badge-ok">${n} correct</span></div>`).join('')}
    </div>` : ''}
    <div class="card">
      <h3 style="margin-bottom:0.75rem;font-size:16px">Session history</h3>
      ${state.history.length === 0 ? '<div style="color:var(--muted);font-size:14px">No sessions yet — start studying!</div>' :
        state.history.slice(-10).reverse().map(h => `
          <div class="history-row">
            <div><div class="history-section">${h.section} — ${h.topic}</div><div style="font-size:12px;color:var(--muted)">${h.date}</div></div>
            <span class="history-score">${h.correct}/${h.total} <span class="badge ${h.correct/h.total>=0.7?'badge-ok':'badge-warn'}">${Math.round(h.correct/h.total*100)}%</span></span>
          </div>`).join('')}
    </div>
  `;
}

function printReport() {
  renderReport();
  setTimeout(() => window.print(), 500);
}

// ============================================================
//  INIT
// ============================================================
updateSidebarStats();
updateStreak();
showPage('home');

function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (state.lastDate === today) return;
  if (state.lastDate === yesterday) state.streak++;
  else if (state.lastDate !== today) state.streak = 1;
  state.lastDate = today;
  saveState();
}
